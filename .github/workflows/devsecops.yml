name: 🏭 DevSecOps & Documentation Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

jobs:
  audit-and-security:
    name: 🛡️ Sécurité & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕵️‍♂️ Scan de Sécurité (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - run: uv python install 3.11
      - run: uv sync

      - name: 🧹 Ruff Check & Format
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: 🧪 Tests Pytest
        run: uv run pytest

  deploy-docs:
    name: 📚 Déploiement Sphinx
    needs: audit-and-security
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - run: uv python install 3.11
      - run: uv sync
      - run: uv run sphinx-build -b html docs docs/_build/html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html
      - id: deployment
        uses: actions/deploy-pages@v4

  build-and-push-docker:
    name: 🐳 CD Docker (GHCR)
    needs: audit-and-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔑 Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Variables
        run: echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: 🚀 Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/mlfactory-api:latest

      - name: 🚀 Push Front
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/front/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/mlfactory-front:latest

      - name: 🚀 Push Train (Automated ML)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/train/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/mlfactory-train:latest    
